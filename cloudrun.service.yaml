apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: deploy
spec:
  template:
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/enhanced-bone-fracture-detection:latest
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_PATH
              value: trained_models/outputs/micro_pipeline_run/micro/best_model.pth
            - name: STRICT_MODEL_LOAD
              value: "false"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
